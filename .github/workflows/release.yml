name: Release

# Si attiva quando si pusha un tag nel formato vX.Y.Z
on:
  push:
    tags:
      - 'v*.*.*'

env:
  IMAGE: quay.io/${{ github.repository_owner }}/garage-openshift-operator
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-push-release:
    name: Build image, push to quay.io, create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necessario per creare la GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build Go binary (verifica compilazione) ──────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Tidy modules
        run: go mod tidy

      - name: Build
        run: go build ./...

      # ── Build e push immagine Docker su quay.io ──────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}   # robot account: "signoredellarete+github_ci"
          password: ${{ secrets.QUAY_TOKEN }}       # token del robot account

      - name: Estrai metadati immagine
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value={{tag}}
            type=raw,value=latest

      - name: Build e push immagine
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ── Genera manifesti all-in-one per questa release ───────────────────────
      - name: Genera install-${{ github.ref_name }}.yaml
        run: |
          VERSION="${GITHUB_REF_NAME}"
          VERSION_NO_V="${VERSION#v}"
          IMAGE_TAG="${{ env.IMAGE }}:${VERSION}"

          # Genera il CSV con versione e immagine corrette
          sed -e "s|REPLACE_VERSION|${VERSION_NO_V}|g" \
              -e "s|REPLACE_IMAGE|${IMAGE_TAG}|g" \
              config/manifests/bases/garage-openshift-operator.clusterserviceversion.yaml \
              > "/tmp/csv-${VERSION}.yaml"

          # Manifest OLM (installa via CSV — per OpenShift)
          cat \
            config/manager/namespace.yaml \
            config/crd/bases/storage.garage.io_garageclusters.yaml \
            config/crd/bases/storage.garage.io_garagewebuis.yaml \
            config/crd/bases/deuxfleurs.fr_garagenodes.yaml \
            config/manifests/operatorgroup.yaml \
            "/tmp/csv-${VERSION}.yaml" \
            > "/tmp/install-${VERSION}.yaml"

          echo "Manifesto OLM generato: install-${VERSION}.yaml"
          wc -l "/tmp/install-${VERSION}.yaml"

      # ── Crea la GitHub Release con il file allegato ──────────────────────────
      - name: Crea GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          generate_release_notes: true
          files: /tmp/install-${{ github.ref_name }}.yaml
          body: |
            ## Installazione rapida

            ```bash
            kubectl apply -f https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/install-${{ github.ref_name }}.yaml
            ```

            Poi crea un namespace e il primo cluster:

            ```bash
            kubectl create namespace garage
            kubectl apply -f https://raw.githubusercontent.com/${{ github.repository }}/refs/tags/${{ github.ref_name }}/config/samples/storage_v1alpha1_garagecluster.yaml
            ```

            **Immagine Docker:** `${{ env.IMAGE }}:${{ github.ref_name }}`
