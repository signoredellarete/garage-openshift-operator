---
apiVersion: v1
kind: Namespace
metadata:
  name: garage-operator-system
  labels:
    control-plane: garage-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: garage-operator
  namespace: garage-operator-system
  labels:
    control-plane: garage-operator
    app.kubernetes.io/name: garage-operator
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: garage-operator
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: garage-operator
    spec:
      serviceAccountName: garage-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: quay.io/signoredellarete/garage-openshift-operator:latest
          imagePullPolicy: IfNotPresent
          args: []
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 10m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      terminationGracePeriodSeconds: 10
